<html>
    <head>
        <meta charset="UTF-8">
        <title>Ejercicio 18 - Factura de Venta</title>
    </head>
    <body bgcolor='#292828' text='#FFFFFF'>

        <h1>Complejo Educativo Alejandro de Humboldt</h1>
        <h2>Formulario de Facturación</h2>

        <form action="Ejercicio18.php" method="POST">
            <fieldset>
                <legend>Datos de Facturación</legend>
                Nombre del cliente: <input type="text" name="cliente" placeholder="Nombre completo" required>
                <br><br>
                Nombre del producto: <input type="text" name="producto" placeholder="Ej: Camisa" required>
                <br><br>
                Cantidad comprada: <input type="number" name="cantidad" min="1" placeholder="Ej: 3" required>
                <br><br>
                Precio unitario ($): <input type="number" name="precio" min="0" step="0.01" placeholder="Ej: 15.00" required>
                <br><br>
            </fieldset>
            <br><br>

            <input type="submit" value="Generar Factura">
            <input type="reset" value="Limpiar">
        </form>

        <a href='index.html'>Regresar al menú principal</a>
    </body>
</html>
